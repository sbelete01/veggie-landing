<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Veggie Quest: The Game</title>
    <style>
        body { margin: 0; background: #87CEEB; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-size: 24px; text-shadow: 2px 2px #000; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        let score = 0;
        let gameActive = true;
        const veggies = [];
        const veggieImg = new Image();
        veggieImg.src = '../broccoli.webp'; // Using your existing broccoli!

        // Handle resizing
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Veggie {
            constructor() {
                this.radius = 40;
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = -this.radius;
                this.speed = Math.random() * 3 + 2; // Gravity speed
                this.rotation = 0;
                this.rotationSpeed = Math.random() * 0.1 - 0.05;
            }

            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;
                // Check if off screen
                if (this.y > canvas.height + this.radius) {
                    this.reset();
                }
            }

            reset() {
                this.y = -this.radius;
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.drawImage(veggieImg, -this.radius, -this.radius, this.radius * 2, this.radius * 2);
                ctx.restore();
            }
        }

        // Spawn some veggies
        for (let i = 0; i < 5; i++) {
            veggies.push(new Veggie());
        }

        // Touch/Mouse interaction
        function handleInput(e) {
            if (!gameActive) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            veggies.forEach(v => {
                const dist = Math.hypot(clientX - v.x, clientY - v.y);
                if (dist < v.radius + 20) { // Hit detection
                    v.reset();
                    score += 10;
                    scoreElement.innerText = score;
                }
            });
        }

        canvas.addEventListener('touchstart', handleInput);
        canvas.addEventListener('mousedown', handleInput);

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Background
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0,0, canvas.width, canvas.height);

            veggies.forEach(v => {
                v.update();
                v.draw();
            });

            requestAnimationFrame(animate);
        }

        veggieImg.onload = animate;
    </script>
</body>
</html>
