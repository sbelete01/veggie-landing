<!DOCTYPE html>
<html>
<head>
    <title>Veggie Quest - Alpha</title>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { border: 4px solid #fff; background: #000; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Simple Game Loop
        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'lime';
            ctx.font = '30px Arial';
            ctx.fillText("Game Engine Loading...", 250, 300);
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
